# Deploy mode — cloud enables Storage Vault + Meta Service
deploy_mode = cloud

# Network
priority_networks = 172.20.80.0/24

# Storage (local cache for cloud mode)
storage_root_path = /opt/apache-doris/be/storage

# Performance
be_port = 9060
webserver_port = 8040
heartbeat_service_port = 9050
brpc_port = 8060

# Disable swap
enable_swap = false

# Cloud unique ID (must match what's registered in Meta Service)
cloud_unique_id = 1:doris_cluster:be-02

# Meta Service endpoint
meta_service_endpoint = 172.20.80.21:5000
priority_networks = 172.20.80.0/24
priority_networks = 172.20.80.0/24
priority_networks = 172.20.80.0/24
priority_networks = 172.20.80.0/24
priority_networks = 172.20.80.0/24
priority_networks = 172.20.80.0/24
priority_networks = 172.20.80.0/24
