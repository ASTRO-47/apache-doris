# Deploy mode — cloud enables Storage Vault + Meta Service
deploy_mode = cloud

# Metadata and log
meta_dir = /opt/apache-doris/fe/doris-meta
LOG_DIR = /opt/apache-doris/fe/log

# Query settings
qe_max_connection = 1024
max_running_txn_num_per_db = 100

# FIX FOR DOCKER + JDK17 CGROUP ISSUE
JAVA_OPTS_FOR_JDK_17="-XX:-UseContainerSupport -Xmx768m -Xms256m"

# Network
priority_networks = 172.20.80.0/24

# Cloud unique ID (must match what's registered in Meta Service)
cloud_unique_id = 1:doris_cluster:fe-02

# Meta Service endpoint
meta_service_endpoint = 172.20.80.21:5000
priority_networks = 172.20.80.0/24
priority_networks = 172.20.80.0/24
priority_networks = 172.20.80.0/24
