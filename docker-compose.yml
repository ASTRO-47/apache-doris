  # Backend 1
  doris-be-01:
    image: "apache/doris:be-4.0.3"
    container_name: "doris-be-01"
    hostname: "be-01"
    cpus: 1.5
    mem_limit: 2g
    depends_on:
      - doris-fe-01
    environment:
      - FE_SERVERS=fe1:172.20.80.2:9010
      - BE_ADDR=172.20.80.4:9050
    ports:
      - "8040:8040"
    volumes:
      - ./be-data-01/storage:/opt/apache-doris/be/storage
      - ./be-data-01/log:/opt/apache-doris/be/log
      - ./confs/be.conf:/opt/apache-doris/be/conf/be.conf
    networks:
      doris_net:
        ipv4_address: 172.20.80.4

  minio:
    image: minio/minio:latest
    container_name: "minio"
    hostname: "minio"
    cpus: 0.5
    mem_limit: 256m
    ports:
      - "9000:9000" 
      - "9001:9001"   
    environment:
      - MINIO_ROOT_USER=astro     
      - MINIO_ROOT_PASSWORD=Makeclean@123  
    command: server /data --console-address ":9001"
    volumes:
      - ./minio-data:/data 
    networks:
      doris_net:
        ipv4_address: 172.20.80.10


  data-generator:
    build:
      context: ./data-generator
      dockerfile: Dockerfile
    container_name: "doris-data-generator"
    profiles: ["generate"]
    cpus: 0.5
    mem_limit: 128m
    depends_on:
      - doris-fe-01
    networks:
      doris_net:
        ipv4_address: 172.20.80.14
    environment:
      - DORIS_FE_HOST=172.20.80.2
      - ROWS_PER_BATCH=100000
      - FILES_PER_BATCH=3
      - SLEEP_SECONDS=10

