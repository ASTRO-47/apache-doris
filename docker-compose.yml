  #==========================================
  # 1. FoundationDB (The Metadata Store)
  # ==========================================
  fdb:
    image: foundationdb/foundationdb:7.1.26
    container_name: fdb
    hostname: fdb
    cpus: 0.5
    mem_limit: 256m
    ports:
      - "4500:4500"
    environment:
      - FDB_NETWORKING_MODE=container
    networks:
      doris_net:
        ipv4_address: 172.20.80.20
    volumes:
      - fdb-config:/var/fdb

  # init the cluster witht the fdbcli
  fdb-init:
    image: foundationdb/foundationdb:7.1.26
    container_name: fdb-init
    depends_on:
      - fdb
    entrypoint: >
      /bin/bash -c "
      until fdbcli -C /var/fdb/fdb.cluster --exec 'status' > /dev/null 2>&1; do
        echo 'Waiting for FDB server...';
        sleep 2;
      done;
      fdbcli -C /var/fdb/fdb.cluster --exec 'configure new single memory' || true;
      echo 'FDB Initialized';
      "
    networks:
      - doris_net
    volumes:
      - fdb-config:/var/fdb

  # ==========================================
  # 2. meta services
  # ==========================================
  doris-ms:
    image: apache/doris:ms-4.0.3 
    container_name: doris-ms
    hostname: ms
    cpus: 0.5
    mem_limit: 512m
    depends_on:
      - fdb
      - minio
    environment:
      - JAVA_OPTS=-Xmx1g
    volumes:
      - ./confs/doris_cloud.conf:/opt/apache-doris/ms/conf/doris_cloud.conf
      - fdb-config:/var/fdb
      - ./scripts/ms-entrypoint.sh:/opt/apache-doris/ms/ms-entrypoint.sh
    entrypoint: ["/bin/bash", "/opt/apache-doris/ms/ms-entrypoint.sh"]
    ports:
      - "5000:5000" # RPC Port
      - "8900:8900" # HTTP Port
    networks:
      doris_net:
        ipv4_address: 172.20.80.21



