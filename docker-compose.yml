networks:
  doris_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.80.0/24

services:

  # ==========================================
  # Init containers (run once, then exit)
  # ==========================================
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    entrypoint: >
      /bin/sh -c "
      until mc alias set myminio http://minio:9000 astro Makeclean@123 --api s3v4 2>/dev/null; do sleep 2; done;
      mc mb --ignore-existing myminio/doris-storage;
      echo 'MinIO bucket ready';
      "
    depends_on:
      - minio
    networks:
      doris_net:
        ipv4_address: 172.20.80.16

  doris-init:
    image: curlimages/curl:latest
    container_name: doris-init
    entrypoint: ["/bin/sh", "/opt/scripts/doris-init.sh"]
    volumes:
      - ./scripts/doris-init.sh:/opt/scripts/doris-init.sh
    depends_on:
      - doris-ms
      - minio-init
    networks:
      doris_net:
        ipv4_address: 172.20.80.15

  # Frontend Master
  doris-fe-01:
    image: "apache/doris:fe-4.0.3"
    container_name: "doris-fe-01"
    hostname: "fe-01"
    cpus: 4.0
    mem_limit: 3g
    restart: always
    depends_on:
      - doris-init
    environment:
      - FE_SERVERS=fe1:172.20.80.2:9010
      - FE_ID=1
      - JAVA_TOOL_OPTIONS=-XX:-UseContainerSupport
    ports:
      - "8030:8030"
      - "9030:9030"
    volumes:
      - ./fe-data-01/doris-meta:/opt/apache-doris/fe/doris-meta
      - ./fe-data-01/log:/opt/apache-doris/fe/log
      - ./confs/fe.conf:/opt/apache-doris/fe/conf/fe.conf
    networks:
      doris_net:
        ipv4_address: 172.20.80.2

  # Backend 1
  doris-be-01:
    image: "apache/doris:be-4.0.3"
    container_name: "doris-be-01"
    hostname: "be-01"
    cpus: 6.0
    mem_limit: 5g
    restart: always
    depends_on:
      - doris-fe-01
      - doris-init
    environment:
      - FE_SERVERS=fe1:172.20.80.2:9010
      - BE_ADDR=172.20.80.4:9050
    ports:
      - "8040:8040"
    volumes:
      - ./be-data-01/storage:/opt/apache-doris/be/storage
      - ./be-data-01/log:/opt/apache-doris/be/log
      - ./confs/be.conf:/opt/apache-doris/be/conf/be.conf
    networks:
      doris_net:
        ipv4_address: 172.20.80.4

  # Backend 2
  doris-be-02:
    image: "apache/doris:be-4.0.3"
    container_name: "doris-be-02"
    hostname: "be-02"
    cpus: 6.0
    mem_limit: 5g
    restart: always
    depends_on:
      - doris-fe-01
      - doris-init
    environment:
      - FE_SERVERS=fe1:172.20.80.2:9010
      - BE_ADDR=172.20.80.5:9050
    ports:
      - "8041:8040"
    volumes:
      - ./be-data-02/storage:/opt/apache-doris/be/storage
      - ./be-data-02/log:/opt/apache-doris/be/log
      - ./confs/be-02.conf:/opt/apache-doris/be/conf/be.conf
    networks:
      doris_net:
        ipv4_address: 172.20.80.5

  minio:
    image: minio/minio:latest
    container_name: "minio"
    hostname: "minio"
    cpus: 2.0
    mem_limit: 2560m
    restart: always
    ports:
      - "9000:9000" 
      - "9001:9001"   
    environment:
      - MINIO_ROOT_USER=astro     
      - MINIO_ROOT_PASSWORD=Makeclean@123  
    command: server /data --console-address ":9001"
    volumes:
      - ./minio-data:/data 
    networks:
      doris_net:
        ipv4_address: 172.20.80.10


  data-generator:
    build:
      context: ./data-generator
      dockerfile: Dockerfile
    container_name: "doris-data-generator"
    profiles: ["generate"]
    cpus: 0.5
    mem_limit: 256m
    depends_on:
      - doris-fe-01
    networks:
      doris_net:
        ipv4_address: 172.20.80.14
    environment:
      - PYTHONUNBUFFERED=1
      - DORIS_FE_HOST=172.20.80.2
      - ROWS_PER_BATCH=100000
      - FILES_PER_BATCH=3
      - SLEEP_SECONDS=10
      - STATS_FILE=/data/generator-stats.json
    volumes:
      - ./generator-stats.json:/data/generator-stats.json

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    cpus: 0.5
    mem_limit: 256m
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      doris_net:
        ipv4_address: 172.20.80.11

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    cpus: 0.5
    mem_limit: 256m
    restart: always
    ports:
      - "3000:3000"
    networks:
      doris_net:
        ipv4_address: 172.20.80.13


  #==========================================
  # 1. FoundationDB (The Metadata Store)
  # ==========================================
  fdb:
    image: foundationdb/foundationdb:7.1.26
    container_name: fdb
    hostname: fdb
    cpus: 1.0
    mem_limit: 1536m
    restart: always
    ports:
      - "4500:4500"
    environment:
      - FDB_NETWORKING_MODE=container
    networks:
      doris_net:
        ipv4_address: 172.20.80.20
    volumes:
      - fdb-config:/var/fdb

  # init the cluster with fdbcli
  fdb-init:
    image: foundationdb/foundationdb:7.1.26
    container_name: fdb-init
    depends_on:
      - fdb
    entrypoint: >
      /bin/bash -c "
      until fdbcli -C /var/fdb/fdb.cluster --exec 'status' > /dev/null 2>&1; do
        echo 'Waiting for FDB server...';
        sleep 2;
      done;
      fdbcli -C /var/fdb/fdb.cluster --exec 'configure new single ssd' || true;
      echo 'FDB Initialized';
      "
    networks:
      doris_net:
        ipv4_address: 172.20.80.22
    volumes:
      - fdb-config:/var/fdb

  # ==========================================
  # 2. meta services
  # ==========================================
  doris-ms:
    image: apache/doris:ms-4.0.3 
    container_name: doris-ms
    hostname: ms
    cpus: 1.0
    mem_limit: 1g
    restart: always
    depends_on:
      - fdb
      - minio
    environment:
      - JAVA_OPTS=-Xmx1g
    volumes:
      - ./confs/doris_cloud.conf:/opt/apache-doris/ms/conf/doris_cloud.conf
      - fdb-config:/var/fdb
      - ./scripts/ms-entrypoint.sh:/opt/apache-doris/ms/ms-entrypoint.sh
    entrypoint: ["/bin/bash", "/opt/apache-doris/ms/ms-entrypoint.sh"]
    ports:
      - "5000:5000" # BRPdocC + HTTP API Port
    networks:
      doris_net:
        ipv4_address: 172.20.80.21



