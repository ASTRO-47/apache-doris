version: '3.8'

networks:
  doris_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.80.0/24

services:
  # Frontend Master
  doris-fe-01:
    image: "apache/doris:fe-4.0.3"
    container_name: "doris-fe-01"
    hostname: "fe-01"
    environment:
      - FE_SERVERS=fe1:172.20.80.2:9010,fe2:172.20.80.3:9010
      - FE_ID=1
    ports:
      - "8030:8030"
      - "9030:9030"
    volumes:
      - ./fe-data-01/doris-meta:/opt/apache-doris/fe/doris-meta
      - ./fe-data-01/log:/opt/apache-doris/fe/log
      # - ./confs/fe.conf:/opt/apache-doris/fe/conf/fe.conf
    networks:
      doris_net:
        ipv4_address: 172.20.80.2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/api/bootstrap"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Follower
  doris-fe-02:
    image: "apache/doris:fe-4.0.3"
    container_name: "doris-fe-02"
    hostname: "fe-02"
    depends_on:
      - doris-fe-01
    environment:
      - FE_SERVERS=fe1:172.20.80.2:9010,fe2:172.20.80.3:9010
      - FE_ID=2
      - FE_MASTER_ADDR=172.20.80.2
      - FE_MASTER_PORT=9010
    ports:
      - "8031:8030"
      - "9031:9030"
    volumes:
      - ./fe-data-02/doris-meta:/opt/apache-doris/fe/doris-meta
      - ./fe-data-02/log:/opt/apache-doris/fe/log
      # - ./confs/fe.conf:/opt/apache-doris/fe/conf/fe.conf
    networks:
      doris_net:
        ipv4_address: 172.20.80.3

  # Backend 1
  doris-be-01:
    image: "apache/doris:be-4.0.3"
    container_name: "doris-be-01"
    hostname: "be-01"
    depends_on:
      - doris-fe-01
    environment:
      - FE_SERVERS=fe1:172.20.80.2:9010
      - BE_ADDR=172.20.80.4:9050
    ports:
      - "8040:8040"
    volumes:
      - ./be-data-01/storage:/opt/apache-doris/be/storage
      - ./be-data-01/log:/opt/apache-doris/be/log
      # - ./confs/be.conf:/opt/apache-doris/be/conf/be.conf
    networks:
      doris_net:
        ipv4_address: 172.20.80.4

  # Backend 2
  doris-be-02:
    image: "apache/doris:be-4.0.3"
    container_name: "doris-be-02"
    hostname: "be-02"
    depends_on:
      - doris-fe-01
    environment:
      - FE_SERVERS=fe1:172.20.80.2:9010
      - BE_ADDR=172.20.80.5:9050
    ports:
      - "8041:8040"
    volumes:
      - ./be-data-02/storage:/opt/apache-doris/be/storage
      - ./be-data-02/log:/opt/apache-doris/be/log
      # - ./confs/be.conf:/opt/apache-doris/be/conf/be.conf
    networks:
      doris_net:
        ipv4_address: 172.20.80.5

  # Backend 3
  doris-be-03:
    image: "apache/doris:be-4.0.3"
    container_name: "doris-be-03"
    hostname: "be-03"
    depends_on:
      - doris-fe-01
    environment:
      - FE_SERVERS=fe1:172.20.80.2:9010
      - BE_ADDR=172.20.80.6:9050
    ports:
      - "8042:8040"
    volumes:
      - ./be-data-03/storage:/opt/apache-doris/be/storage
      - ./be-data-03/log:/opt/apache-doris/be/log
      # - ./confs/be.conf:/opt/apache-doris/be/conf/be.conf
    networks:
      doris_net:
        ipv4_address: 172.20.80.6

  # Data Generator - Run manually after cluster is ready
  # data-generator:
  #   build:
  #     context: ./data-generator
  #     dockerfile: Dockerfile
  #   container_name: "doris-data-generator"
  #   depends_on:
  #     - doris-fe-01
  #   environment:
  #     - DORIS_FE_HOST=172.20.80.2
  #     - DORIS_FE_PORT=9030
  #     - DORIS_USER=root
  #     - DORIS_PASSWORD=
  #     - EVENTS_PER_SECOND=10
  #   networks:
  #     - doris_net
  #   command: python generator.py